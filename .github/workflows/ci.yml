name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -o csm-bin ./cmd/csm
      - name: Smoke test (no claude binary needed)
        shell: pwsh
        env:
          CSM_HOME: ${{ runner.temp }}/csm-home
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          ./csm-bin --version
          ./csm-bin init
          ./csm-bin add "Smoke test task" --effort low --mode plan --priority 3
          ./csm-bin add "Second task"
          ./csm-bin list
          ./csm-bin config set default_effort high
          if ((./csm-bin config get default_effort) -ne '"high"') { throw "config set/get mismatch" }
          ./csm-bin config unset default_effort
          ./csm-bin status
          ./csm-bin run --dry-run
          ./csm-bin clear --all
          ./csm-bin list
